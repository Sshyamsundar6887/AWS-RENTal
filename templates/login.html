{% extends "base.html" %}
{% block title %}Login — RentWheels{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="glass-card auth-card no-hover fade-in-up">
    <div class="auth-logo" id="auth-logo">🔐</div>
    <h2 id="auth-heading">Welcome Back</h2>
    <p class="auth-sub" id="auth-sub">Sign in to your RentWheels account</p>

    <!-- User Login Form -->
    <form method="POST" action="{{ url_for('login') }}" id="user-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" class="form-control" placeholder="Enter your username" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required />
      </div>

      <button type="submit" id="login-btn" class="btn btn-primary btn-full">Sign In</button>
    </form>

    <p class="link-text mt-2" id="register-link">
      Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
    </p>

    <!-- Admin Login Form (hidden by default) -->
    <form method="POST" action="{{ url_for('login') }}" id="admin-form" style="display:none;">
      <div class="form-group">
        <label for="admin_username">Admin Username</label>
        <input type="text" id="admin_username" name="username" class="form-control" placeholder="Enter admin username" required />
      </div>

      <div class="form-group">
        <label for="admin_password">Admin Password</label>
        <input type="password" id="admin_password" name="password" class="form-control" placeholder="Enter admin password" required />
      </div>

      <button type="submit" id="admin-submit-btn" class="btn btn-primary btn-full">Sign In as Admin</button>
    </form>

    <div class="admin-divider">
      <span>or</span>
    </div>

    <button type="button" id="toggle-btn" class="btn btn-outline btn-full" onclick="toggleLogin()">
      🛡️ Login as Admin
    </button>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  let isAdminMode = false;

  function toggleLogin() {
    isAdminMode = !isAdminMode;

    const userForm = document.getElementById('user-form');
    const adminForm = document.getElementById('admin-form');
    const registerLink = document.getElementById('register-link');
    const toggleBtn = document.getElementById('toggle-btn');
    const logo = document.getElementById('auth-logo');
    const heading = document.getElementById('auth-heading');
    const subtitle = document.getElementById('auth-sub');

    if (isAdminMode) {
      userForm.style.display = 'none';
      registerLink.style.display = 'none';
      adminForm.style.display = 'block';
      toggleBtn.textContent = '👤 Login as User';
      logo.textContent = '🛡️';
      heading.textContent = 'Admin Login';
      subtitle.textContent = 'Enter your admin credentials';
      document.getElementById('admin_username').focus();
    } else {
      adminForm.style.display = 'none';
      userForm.style.display = 'block';
      registerLink.style.display = 'block';
      toggleBtn.textContent = '🛡️ Login as Admin';
      logo.textContent = '🔐';
      heading.textContent = 'Welcome Back';
      subtitle.textContent = 'Sign in to your RentWheels account';
    }
  }
</script>
{% endblock %}
